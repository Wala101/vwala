<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver Aposta - Wala Predictions</title>
  <link rel="icon" type="image/png" href="/logo.png" />

  <link rel="stylesheet" href="/src/style/view-market.css">
</head>
<body>
  <div class="page-shell">
    <div class="app-frame">
      <main class="app-content">
        <div class="view-market-page">

          <!-- Header -->
          <div class="header-view">
            <h1>🎲 Wala Predictions</h1>
            <p>Busque uma aposta compartilhada ou veja seu histórico</p>
          </div>

          <!-- Tabs -->
          <div class="tabs">
            <button id="tabSearch" class="tab-btn active">🔍 Buscar Aposta</button>
            <button id="tabHistory" class="tab-btn">📜 Meu Histórico</button>
          </div>

          <!-- ==================== ABA BUSCAR ==================== -->
          <div id="searchTab" class="tab-content">
            <div class="search-card">
              <input type="text" id="marketId" class="input" placeholder="Cole o Tx Hash aqui..." />
              <button id="searchBtn" class="launch-btn">Buscar Aposta</button>
            </div>

            <div id="marketContent" class="market-content" style="display: none;">
              <!-- Conteúdo carregado via JS -->
            </div>
          </div>

          <!-- ==================== ABA HISTÓRICO ==================== -->
          <div id="historyTab" class="tab-content" style="display: none;">
            <div class="history-card">
              <div class="history-header">
                <h2> Seu Histórico de Apostas</h2>
              </div>

              <div id="historyList" class="history-list">
                <!-- Preenchido via JavaScript -->
                <div class="loading-history">Carregando suas apostas...</div>
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/src/view-market.js"></script>
</body>
</html>
