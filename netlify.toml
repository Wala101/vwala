[build]
command = "npm run build"
publish = "dist"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[functions."sync-football"]
schedule = "*/30 * * * *"

[[redirects]]
  from = "/api/rpc"
  to = "/.netlify/functions/rpc"
  status = 200
  force = true

[[redirects]]
  from = "/api/rpc-fallback"
  to = "/.netlify/functions/rpc-fallback"
  status = 200
  force = true

[[redirects]]
  from = "/api/sync-football"
  to = "/.netlify/functions/sync-football"
  status = 200
  force = true